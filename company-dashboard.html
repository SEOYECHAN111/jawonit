<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>백업센터 | 자원잇다</title><link rel="icon" type="image/png" href="/assets/favicon.png?v=51.12.0"><link rel="stylesheet" href="/css/styles.css?v=51.12.0"></head><body><header class="site-header"><div class="container nav"><a class="brand brand-image" href="/index.html" aria-label="자원잇다 홈"><img src="/assets/jawonitda-logo.png?v=51.12.0" alt="자원잇다"></a><button class="mobile-toggle" id="mobileToggle">메뉴</button><nav class="menu" id="menu"></nav><div class="nav-spacer"></div><div class="account-area" id="accountArea"></div></div></header><main class="section"><div class="container"><section class="notice17-hero"><span class="eyebrow">Admin Backup</span><h1>백업센터</h1><p>중간배포에서는 관리자 운영 데이터 백업 안내만 제공합니다. 실제 운영 전에는 데이터베이스 자동백업, 파일저장소 백업, 감사로그 보관정책을 연결해야 합니다.</p></section><div class="grid cols-3"><article class="card"><h3>DB 백업</h3><p>현재 MVP는 storage/db.json 기반입니다. 운영 전 PostgreSQL 백업으로 전환하세요.</p></article><article class="card"><h3>파일 백업</h3><p>공지 첨부, 증빙자료, 사진 업로드는 S3 등 외부 스토리지와 버전관리가 필요합니다.</p></article><article class="card"><h3>감사로그</h3><p>관리자 승인, 공지 등록, API 키 변경 등 운영 로그는 별도 보관해야 합니다.</p></article></div><p style="margin-top:20px"><a class="btn primary" href="/dashboards/admin.html">관리자로 돌아가기</a></p></div></main><div class="quick-help" id="quickHelp"></div><script src="/js/app.js?v=51.12.0"></script></body></html>
